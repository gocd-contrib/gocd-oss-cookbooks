[tools]
"java" = "temurin-25"

# Functional test/release tools
"ruby" = "4.0"
"node" = { version = "24", postinstall = "corepack enable" }
"maven" = "3"
"aqua:getgauge/gauge" = { version = "1", postinstall = "gauge install ruby; gauge install html-report; gauge install screenshot" }
"aqua:regclient/regclient/regctl" = "latest"
"aqua:aws/aws-cli" = { version = "latest", symlink_bins = true }
"github:mozilla/geckodriver" = "latest"

# Bootstrapping
"aqua:krallin/tini" = "latest"
"github:gocd-contrib/gocd-golang-bootstrapper" = { version = "latest", bin = "go-agent" }
