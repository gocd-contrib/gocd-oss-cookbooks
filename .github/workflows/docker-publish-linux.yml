name: Build Linux

on:
  push:
    branches: [master]
    paths-ignore:
      - 'README.md'
      - '**/*windows*'
      - '**/*windows*/*'
  pull_request:
    branches: [master]
    paths-ignore:
      - 'README.md'
      - '**/*windows*'
      - '**/*windows*/*'
  schedule:
    - cron: '0 2 * * FRI' # Run every Friday at 2:00 AM UTC
  workflow_dispatch:      # Allow manual trigger

permissions:
  contents: read

env:
  REGISTRY_IMAGE: gocddev/gocd-dev-build
  IMAGE_VERSION: "v3.27"

jobs:
  linux-build:
    name: linux-${{ matrix.distro }}-${{ matrix.arch }}
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - aarch64
        distro:
          - rhelcompat-10
          - ubuntu-24-04
          - dind
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          flavor: prefix=${{ matrix.distro }}-
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.IMAGE_VERSION }}
            type=sha,prefix=${{ matrix.distro }}-${{ env.IMAGE_VERSION }}-
            type=schedule,pattern={{date 'YYYYMMDD'}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to Docker Hub
        if: ${{ github.event_name != 'pull_request' || startsWith(github.ref, 'refs/pull/') }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: linux-${{ matrix.distro }}.Dockerfile
          secrets: github_token=${{ secrets.GITHUB_TOKEN }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},name-canonical=true,push=${{ github.event_name != 'pull_request' }},push-by-digest=${{ github.event_name != 'pull_request' }}
          pull: true

      - name: Export digest
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
          
      - name: Upload digest
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: digests-${{ matrix.distro }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  linux-push:
    name: linux-push-${{ matrix.distro }}
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    needs:
      - linux-build
    strategy:
      fail-fast: false
      matrix:
        distro:
          - rhelcompat-10
          - ubuntu-24-04
          - dind
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Download x86_64 digest
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: digests-${{ matrix.distro }}-x86_64
          path: /tmp/digests
      - name: Download aarch64 digest
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: digests-${{ matrix.distro }}-aarch64
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          flavor: prefix=${{ matrix.distro }}-
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.IMAGE_VERSION }}
            type=sha,prefix=${{ matrix.distro }}-${{ env.IMAGE_VERSION }}-
            type=schedule,pattern={{date 'YYYYMMDD'}}

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)
