name: Build Linux

on:
  push:
    branches: [master]
    paths-ignore:
      - 'README.md'
      - '**/*windows*'
      - '**/*windows*/*'
  pull_request:
    branches: [master]
    paths-ignore:
      - 'README.md'
      - '**/*windows*'
      - '**/*windows*/*'
  schedule:
    - cron: '0 2 * * FRI' # Run every Friday at 2:00 AM UTC
  workflow_dispatch:      # Allow manual trigger

permissions:
  contents: read

env:
  REGISTRY_IMAGE: gocddev/gocd-dev-build
  IMAGE_VERSION: "v3.27"

jobs:
  linux-build:
    name: linux-${{ matrix.distro }}-${{ matrix.arch }}
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - aarch64
        distro:
          - rhelcompat-10
          - ubuntu-26-04
          - dind
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          flavor: prefix=${{ matrix.distro }}-
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.IMAGE_VERSION }}
            type=sha,prefix=${{ matrix.distro }}-${{ env.IMAGE_VERSION }}-
            type=schedule,pattern={{date 'YYYYMMDD'}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to Docker Hub
        if: ${{ github.event_name != 'pull_request' || startsWith(github.head_ref, 'refs/pull/') }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: linux-${{ matrix.distro }}.Dockerfile
          secrets: github_token=${{ secrets.GITHUB_TOKEN }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},name-canonical=true,push=${{ github.event_name != 'pull_request' }},push-by-digest=${{ github.event_name != 'pull_request' }}
          pull: true

      - name: Export digest
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
          
      - name: Upload digest
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.distro }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  linux-push:
    name: linux-push-${{ matrix.distro }}
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    needs:
      - linux-build
    strategy:
      fail-fast: false
      matrix:
        distro:
          - rhelcompat-10
          - ubuntu-26-04
          - dind
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download x86_64 digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: digests-${{ matrix.distro }}-x86_64
          path: /tmp/digests
      - name: Download aarch64 digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: digests-${{ matrix.distro }}-aarch64
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          flavor: prefix=${{ matrix.distro }}-
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.IMAGE_VERSION }}
            type=sha,prefix=${{ matrix.distro }}-${{ env.IMAGE_VERSION }}-
            type=schedule,pattern={{date 'YYYYMMDD'}}

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)
