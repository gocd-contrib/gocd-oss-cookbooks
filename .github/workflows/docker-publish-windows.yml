name: Build Windows

on:
  push:
    branches: [master]
    paths-ignore:
      - 'README.md'
      - '**/*linux*'
      - '**/*linux*/*'
  pull_request:
    branches: [master]
    paths-ignore:
      - 'README.md'
      - '**/*linux*'
      - '**/*linux*/*'
  schedule:
    - cron: '0 2 * * FRI' # Run every Friday at 2:00 AM UTC
  workflow_dispatch:      # Allow manual trigger

permissions:
  contents: read

env:
  REGISTRY_IMAGE: gocddev/gocd-dev-build
  IMAGE_VERSION: "v3.27"

jobs:
  windows:
    name: ${{ matrix.distro }}
    runs-on: ${{ matrix.distro }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { distro: windows-2025, edition: ltsc2025 }
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          flavor: prefix=${{ matrix.distro }}-
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.IMAGE_VERSION }}
            type=sha,prefix=${{ matrix.distro }}-${{ env.IMAGE_VERSION }}-
            type=schedule,pattern={{date 'YYYYMMDD'}}

      - name: Build and push
        uses: mr-smithers-excellent/docker-build-push@ef432483bd0252dd948d1d11e60c96a1c93646a9 # v7.0
        with:
          dockerfile: windowsservercore.Dockerfile
          # no secrets/buildkit support for windows, so have to be content with the ephemeral read-only token being in the layer :(
          buildArgs: "EDITION=${{ matrix.edition }}, GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}"
          labels: ${{ join(fromJSON(steps.meta.outputs.json).labels, ', ') }}
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          image: ${{ env.REGISTRY_IMAGE }}
          tags: ${{ join(fromJSON(steps.meta.outputs.json).tag-names, ', ') }}
          pushImage: ${{ github.event_name != 'pull_request' }}
